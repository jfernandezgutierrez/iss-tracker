<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#152544"/>
      <stop offset="60%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#04070F"/>
    </radialGradient>
    <radialGradient id="planet" cx="35%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#2B5DA0"/>
      <stop offset="55%" stop-color="#0E2E5C"/>
      <stop offset="100%" stop-color="#06152C"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4DA3FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4DA3FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Estrellas -->
  <g fill="#FFFFFF">
    <circle cx="60" cy="80" r="2" opacity="0.9"/>
    <circle cx="140" cy="40" r="1.5" opacity="0.7"/>
    <circle cx="220" cy="100" r="1.8" opacity="0.85"/>
    <circle cx="320" cy="60" r="1.4" opacity="0.6"/>
    <circle cx="420" cy="110" r="2.2" opacity="0.95"/>
    <circle cx="470" cy="50" r="1.5" opacity="0.7"/>
    <circle cx="80" cy="200" r="1.6" opacity="0.75"/>
    <circle cx="450" cy="220" r="1.7" opacity="0.85"/>
    <circle cx="60" cy="380" r="1.4" opacity="0.7"/>
    <circle cx="430" cy="430" r="1.8" opacity="0.85"/>
    <circle cx="170" cy="470" r="1.5" opacity="0.7"/>
    <circle cx="370" cy="480" r="1.4" opacity="0.6"/>
  </g>

  <!-- Glow detrás del planeta -->
  <circle cx="340" cy="340" r="180" fill="url(#glow)"/>

  <!-- Planeta Tierra -->
  <g transform="translate(340,340)">
    <circle r="120" fill="url(#planet)" stroke="#1d3a6e" stroke-width="2"/>
    <path d="M -60,-30 q 22,-28 56,-22 q 28,8 22,36 q -7,22 -36,22 q -36,-4 -42,-36 z"
          fill="#1f5fa8" opacity="0.85"/>
    <path d="M -22,22 q 28,-12 56,4 q 14,12 -8,28 q -36,12 -56,-8 q -10,-12 8,-24 z"
          fill="#1f5fa8" opacity="0.8"/>
    <path d="M 40,-50 q 18,-8 32,12 q 4,18 -18,22 q -22,-2 -18,-22 z"
          fill="#1f5fa8" opacity="0.78"/>
    <!-- Sombra -->
    <path d="M 0,-120 a 120,120 0 0 1 0,240 a 60,120 0 0 0 0,-240 z"
          fill="#04070F" opacity="0.5"/>
    <!-- Atmósfera -->
    <circle r="120" fill="none" stroke="#6EAEFF" stroke-width="2.5" opacity="0.5"/>
    <circle r="126" fill="none" stroke="#6EAEFF" stroke-width="1.5" opacity="0.25"/>
  </g>

  <!-- Trayectoria orbital -->
  <path d="M 40,420 C 160,300 320,210 480,100"
        fill="none"
        stroke="#6EF2D8"
        stroke-width="4"
        stroke-dasharray="14 12"
        opacity="0.85"/>

  <!-- ISS estilizada -->
  <g transform="translate(220,205) rotate(-30)">
    <!-- Cuerpo -->
    <rect x="-16" y="-8" width="32" height="16" rx="3" fill="#E5EAF2" stroke="#0B1220" stroke-width="1.5"/>
    <!-- Módulos -->
    <rect x="-32" y="-4" width="16" height="8" fill="#B8C2D2"/>
    <rect x="16" y="-4" width="16" height="8" fill="#B8C2D2"/>
    <!-- Paneles solares -->
    <rect x="-92" y="-26" width="56" height="52" fill="#1B3D7B" stroke="#6EF2D8" stroke-width="2"/>
    <rect x="36" y="-26" width="56" height="52" fill="#1B3D7B" stroke="#6EF2D8" stroke-width="2"/>
    <!-- Líneas de paneles -->
    <g stroke="#6EF2D8" stroke-width="0.8" opacity="0.85">
      <line x1="-78" y1="-26" x2="-78" y2="26"/>
      <line x1="-64" y1="-26" x2="-64" y2="26"/>
      <line x1="-50" y1="-26" x2="-50" y2="26"/>
      <line x1="50" y1="-26" x2="50" y2="26"/>
      <line x1="64" y1="-26" x2="64" y2="26"/>
      <line x1="78" y1="-26" x2="78" y2="26"/>
    </g>
    <!-- Antena -->
    <line x1="0" y1="-8" x2="0" y2="-26" stroke="#E5EAF2" stroke-width="2.5"/>
    <circle cx="0" cy="-26" r="3.5" fill="#FF5577"/>
  </g>

  <!-- Punto pulsante -->
  <circle cx="220" cy="205" r="6" fill="#6EF2D8"/>
  <circle cx="220" cy="205" r="14" fill="none" stroke="#6EF2D8" stroke-width="2" opacity="0.5"/>
</svg>
