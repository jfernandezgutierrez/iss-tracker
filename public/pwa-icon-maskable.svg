<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#152544"/>
      <stop offset="60%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#04070F"/>
    </radialGradient>
    <radialGradient id="planet" cx="35%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#2B5DA0"/>
      <stop offset="55%" stop-color="#0E2E5C"/>
      <stop offset="100%" stop-color="#06152C"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4DA3FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4DA3FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo de borde a borde para que el "safe zone" sea sólo el centro -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Estrellas dispersas -->
  <g fill="#FFFFFF">
    <circle cx="80" cy="100" r="2" opacity="0.85"/>
    <circle cx="160" cy="60" r="1.4" opacity="0.7"/>
    <circle cx="430" cy="90" r="1.8" opacity="0.85"/>
    <circle cx="60" cy="270" r="1.6" opacity="0.7"/>
    <circle cx="460" cy="320" r="1.7" opacity="0.8"/>
    <circle cx="90" cy="430" r="1.5" opacity="0.7"/>
    <circle cx="420" cy="450" r="1.8" opacity="0.85"/>
  </g>

  <!-- Todo el contenido importante dentro del 80% central (safe zone) = 51px de margen aprox.
       Centrado en (256,256), todo cabe dentro de un círculo de radio ~205. -->
  <g transform="translate(256,256)">
    <!-- Glow de la Tierra -->
    <circle cx="60" cy="55" r="140" fill="url(#glow)"/>

    <!-- Planeta -->
    <g transform="translate(60,55)">
      <circle r="92" fill="url(#planet)" stroke="#1d3a6e" stroke-width="2"/>
      <path d="M -46,-22 q 18,-22 44,-16 q 22,6 16,28 q -6,16 -28,16 q -28,-2 -32,-28 z"
            fill="#1f5fa8" opacity="0.85"/>
      <path d="M -16,18 q 22,-10 44,2 q 12,10 -6,22 q -28,10 -44,-6 q -8,-10 6,-18 z"
            fill="#1f5fa8" opacity="0.8"/>
      <path d="M 32,-38 q 14,-6 24,8 q 4,14 -14,18 q -16,-2 -14,-18 z"
            fill="#1f5fa8" opacity="0.78"/>
      <path d="M 0,-92 a 92,92 0 0 1 0,184 a 46,92 0 0 0 0,-184 z"
            fill="#04070F" opacity="0.5"/>
      <circle r="92" fill="none" stroke="#6EAEFF" stroke-width="2" opacity="0.5"/>
      <circle r="97" fill="none" stroke="#6EAEFF" stroke-width="1.2" opacity="0.25"/>
    </g>

    <!-- Trayectoria -->
    <path d="M -160,140 C -80,40 60,-40 180,-130"
          fill="none"
          stroke="#6EF2D8"
          stroke-width="4"
          stroke-dasharray="12 10"
          opacity="0.85"/>

    <!-- ISS estilizada en el cuadrante superior izquierdo, dentro del safe zone -->
    <g transform="translate(-90,-50) rotate(-30)">
      <rect x="-14" y="-7" width="28" height="14" rx="3" fill="#E5EAF2" stroke="#0B1220" stroke-width="1.4"/>
      <rect x="-28" y="-3.5" width="14" height="7" fill="#B8C2D2"/>
      <rect x="14" y="-3.5" width="14" height="7" fill="#B8C2D2"/>
      <rect x="-78" y="-22" width="48" height="44" fill="#1B3D7B" stroke="#6EF2D8" stroke-width="1.6"/>
      <rect x="30" y="-22" width="48" height="44" fill="#1B3D7B" stroke="#6EF2D8" stroke-width="1.6"/>
      <g stroke="#6EF2D8" stroke-width="0.7" opacity="0.85">
        <line x1="-66" y1="-22" x2="-66" y2="22"/>
        <line x1="-54" y1="-22" x2="-54" y2="22"/>
        <line x1="-42" y1="-22" x2="-42" y2="22"/>
        <line x1="42" y1="-22" x2="42" y2="22"/>
        <line x1="54" y1="-22" x2="54" y2="22"/>
        <line x1="66" y1="-22" x2="66" y2="22"/>
      </g>
      <line x1="0" y1="-7" x2="0" y2="-22" stroke="#E5EAF2" stroke-width="2"/>
      <circle cx="0" cy="-22" r="3" fill="#FF5577"/>
    </g>

    <!-- Punto sobre la trayectoria -->
    <circle cx="-90" cy="-50" r="5" fill="#6EF2D8"/>
    <circle cx="-90" cy="-50" r="12" fill="none" stroke="#6EF2D8" stroke-width="1.8" opacity="0.5"/>
  </g>
</svg>
