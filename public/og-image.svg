<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Fondo espacial: degradado profundo -->
    <radialGradient id="bgGradient" cx="30%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#152544"/>
      <stop offset="55%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#04070F"/>
    </radialGradient>

    <!-- Brillo del título -->
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6EF2D8"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#4DA3FF"/>
    </linearGradient>

    <!-- Glow del planeta -->
    <radialGradient id="earthGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4DA3FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4DA3FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Tierra (parche) -->
    <radialGradient id="earthFill" cx="35%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#2B5DA0"/>
      <stop offset="55%" stop-color="#0E2E5C"/>
      <stop offset="100%" stop-color="#06152C"/>
    </radialGradient>

    <!-- Trayectoria orbital -->
    <linearGradient id="orbitGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6EF2D8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6EF2D8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#4DA3FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Estrellas dispersas -->
  <g fill="#FFFFFF">
    <circle cx="80" cy="60" r="1.4" opacity="0.9"/>
    <circle cx="180" cy="120" r="1" opacity="0.7"/>
    <circle cx="260" cy="40" r="1.6" opacity="0.85"/>
    <circle cx="340" cy="180" r="1.1" opacity="0.6"/>
    <circle cx="430" cy="80" r="1.3" opacity="0.8"/>
    <circle cx="540" cy="50" r="1" opacity="0.55"/>
    <circle cx="640" cy="160" r="1.4" opacity="0.85"/>
    <circle cx="760" cy="90" r="1.1" opacity="0.7"/>
    <circle cx="870" cy="40" r="1.6" opacity="0.95"/>
    <circle cx="980" cy="130" r="1.2" opacity="0.65"/>
    <circle cx="1080" cy="60" r="1" opacity="0.8"/>
    <circle cx="1140" cy="170" r="1.3" opacity="0.7"/>
    <circle cx="60" cy="320" r="1.1" opacity="0.7"/>
    <circle cx="150" cy="430" r="1.4" opacity="0.85"/>
    <circle cx="100" cy="520" r="1.2" opacity="0.7"/>
    <circle cx="220" cy="560" r="1" opacity="0.55"/>
    <circle cx="320" cy="500" r="1.3" opacity="0.8"/>
    <circle cx="50" cy="220" r="1" opacity="0.6"/>
    <circle cx="1130" cy="380" r="1.4" opacity="0.85"/>
    <circle cx="1080" cy="500" r="1.1" opacity="0.7"/>
    <circle cx="970" cy="570" r="1.2" opacity="0.65"/>
    <circle cx="850" cy="540" r="1" opacity="0.5"/>
    <circle cx="730" cy="580" r="1.3" opacity="0.8"/>
    <!-- Brillos algo más grandes -->
    <circle cx="200" cy="240" r="2" opacity="0.95"/>
    <circle cx="1010" cy="280" r="2.2" opacity="0.85"/>
    <circle cx="450" cy="540" r="2" opacity="0.9"/>
  </g>

  <!-- Glow detrás del planeta -->
  <circle cx="970" cy="470" r="280" fill="url(#earthGlow)"/>

  <!-- Tierra -->
  <g transform="translate(970,470)">
    <circle r="180" fill="url(#earthFill)" stroke="#1d3a6e" stroke-width="1.5"/>
    <!-- Continentes esquemáticos -->
    <path d="M -90,-40 q 30,-40 80,-30 q 40,10 30,50 q -10,30 -50,30 q -50,-5 -60,-50 z"
          fill="#1f5fa8" opacity="0.85"/>
    <path d="M -30,30 q 40,-15 80,5 q 20,15 -10,40 q -50,15 -80,-10 q -15,-15 10,-35 z"
          fill="#1f5fa8" opacity="0.8"/>
    <path d="M 60,-70 q 25,-10 45,15 q 5,25 -25,30 q -30,-2 -25,-30 z"
          fill="#1f5fa8" opacity="0.78"/>
    <!-- Sombra del lado oscuro -->
    <path d="M 0,-180 a 180,180 0 0 1 0,360 a 90,180 0 0 0 0,-360 z"
          fill="#04070F" opacity="0.55"/>
    <!-- Atmósfera -->
    <circle r="180" fill="none" stroke="#6EAEFF" stroke-width="2" opacity="0.45"/>
    <circle r="186" fill="none" stroke="#6EAEFF" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Trayectoria orbital (curva) -->
  <path d="M 60,540 C 300,360 700,260 1140,160"
        fill="none"
        stroke="url(#orbitGradient)"
        stroke-width="3"
        stroke-dasharray="10 10"
        opacity="0.85"/>

  <!-- ISS (icono estilizado) sobre la trayectoria -->
  <g transform="translate(720,275) rotate(-22)">
    <!-- Cuerpo central -->
    <rect x="-12" y="-6" width="24" height="12" rx="2" fill="#E5EAF2" stroke="#0B1220" stroke-width="1.2"/>
    <!-- Módulos laterales -->
    <rect x="-26" y="-3" width="14" height="6" fill="#B8C2D2"/>
    <rect x="12" y="-3" width="14" height="6" fill="#B8C2D2"/>
    <!-- Paneles solares -->
    <rect x="-78" y="-20" width="48" height="40" fill="#1B3D7B" stroke="#6EF2D8" stroke-width="1.2"/>
    <rect x="30" y="-20" width="48" height="40" fill="#1B3D7B" stroke="#6EF2D8" stroke-width="1.2"/>
    <!-- Líneas de los paneles -->
    <g stroke="#6EF2D8" stroke-width="0.6" opacity="0.8">
      <line x1="-66" y1="-20" x2="-66" y2="20"/>
      <line x1="-54" y1="-20" x2="-54" y2="20"/>
      <line x1="-42" y1="-20" x2="-42" y2="20"/>
      <line x1="42" y1="-20" x2="42" y2="20"/>
      <line x1="54" y1="-20" x2="54" y2="20"/>
      <line x1="66" y1="-20" x2="66" y2="20"/>
    </g>
    <!-- Antena -->
    <line x1="0" y1="-6" x2="0" y2="-22" stroke="#E5EAF2" stroke-width="2"/>
    <circle cx="0" cy="-22" r="2.5" fill="#FF5577"/>
  </g>

  <!-- Punto de luz pulsante en la trayectoria -->
  <circle cx="720" cy="275" r="4" fill="#6EF2D8" opacity="0.9"/>
  <circle cx="720" cy="275" r="11" fill="none" stroke="#6EF2D8" stroke-width="1.5" opacity="0.45"/>

  <!-- Eyebrow -->
  <text x="80" y="195"
        font-family="Poppins, Lato, Helvetica, Arial, sans-serif"
        font-size="22"
        font-weight="700"
        fill="#6EF2D8"
        letter-spacing="6">
    EN ÓRBITA · TIEMPO REAL
  </text>

  <!-- Título principal (color sólido para que renderice bien al exportar a PNG) -->
  <text x="80" y="290"
        font-family="Poppins, Lato, Helvetica, Arial, sans-serif"
        font-size="96"
        font-weight="800"
        fill="#FFFFFF">
    ISS Tracker
  </text>

  <!-- Subtítulo -->
  <text x="80" y="370"
        font-family="Poppins, Lato, Helvetica, Arial, sans-serif"
        font-size="34"
        font-weight="600"
        fill="#E5EAF2">
    Sigue la Estación Espacial
  </text>
  <text x="80" y="412"
        font-family="Poppins, Lato, Helvetica, Arial, sans-serif"
        font-size="34"
        font-weight="600"
        fill="#E5EAF2">
    Internacional en directo
  </text>

  <!-- Píldoras de features -->
  <g font-family="Poppins, Lato, Helvetica, Arial, sans-serif" font-size="20" font-weight="700">
    <g transform="translate(80,475)">
      <rect x="0" y="0" width="200" height="44" rx="22" fill="#4DA3FF" fill-opacity="0.18" stroke="#4DA3FF" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="5" fill="#4DA3FF"/>
      <text x="38" y="29" fill="#BCD8FF">Mapa en vivo</text>
    </g>
    <g transform="translate(295,475)">
      <rect x="0" y="0" width="195" height="44" rx="22" fill="#6EF2D8" fill-opacity="0.18" stroke="#6EF2D8" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="5" fill="#6EF2D8"/>
      <text x="38" y="29" fill="#D8FFF5">Tripulación</text>
    </g>
    <g transform="translate(505,475)">
      <rect x="0" y="0" width="220" height="44" rx="22" fill="#FF5577" fill-opacity="0.18" stroke="#FF5577" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="5" fill="#FF5577"/>
      <text x="38" y="29" fill="#FFC0CB">Directos NASA</text>
    </g>
  </g>

  <!-- Dominio -->
  <text x="80" y="570"
        font-family="Poppins, Lato, Helvetica, Arial, sans-serif"
        font-size="22"
        font-weight="700"
        fill="#9AA8BF"
        letter-spacing="2">
    isstrackerlive.es
  </text>
</svg>
